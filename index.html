<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Huntertales — Active Deployment Predictor</title>
  <script src="https://unpkg.com/ethers@6.13.4/dist/ethers.umd.min.js"></script>
  <style>
    :root{
      --bg:#0b0d12;
      --panel:#11141c;
      --panel2:#0f1218;
      --border:#252a36;
      --border2:#303648;
      --text:#e8ebf5;
      --muted:#9aa3b5;
      --muted2:#77809a;
      --ok:#2ee59d;
      --bad:#ff5c7a;
      --warn:#ffd166;
      --mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      --sans: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial;
      --r:14px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font:14px/1.45 var(--sans);
      color:var(--text);
      background:var(--bg);
    }
    a{color:#9ec5ff;text-decoration:none}
    a:hover{text-decoration:underline}
    .app{max-width:1200px;margin:0 auto;padding:18px 14px 64px}

    /* top bar */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;
      padding:14px 14px;
      border:1px solid var(--border);
      border-radius:var(--r);
      background:var(--panel);
    }
    .title{display:flex;align-items:center;gap:12px;min-width:260px}
    .mark{
      width:40px;height:40px;border-radius:12px;
      border:1px solid var(--border2);
      background:var(--panel2);
      display:flex;align-items:center;justify-content:center;
      font-weight:800;letter-spacing:.4px;
    }
    .h1{font-weight:800;font-size:16px;letter-spacing:.2px}
    .sub{color:var(--muted);font-size:12.5px;margin-top:2px;max-width:820px}
    .rightMeta{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:8px 10px;
      border:1px solid var(--border);
      border-radius:999px;
      background:var(--panel2);
      color:var(--muted);
      white-space:nowrap;
      font-size:12px;
    }
    .dot{width:8px;height:8px;border-radius:99px;background:var(--warn)}
    .dot.ok{background:var(--ok)}
    .dot.bad{background:var(--bad)}

    /* controls */
    .controls{
      margin-top:12px;
      border:1px solid var(--border);
      border-radius:var(--r);
      background:var(--panel);
      padding:14px;
    }
    .controlsRow{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
    label{display:block;color:var(--muted2);font-size:12px;margin:0 0 6px}
    input,button{
      border-radius:12px;
      border:1px solid var(--border);
      background:var(--panel2);
      color:var(--text);
      padding:10px 12px;
      outline:none;
    }
    input:focus{border-color:#6ea8ff; box-shadow:0 0 0 3px rgba(110,168,255,.14)}
    input.mono{font-family:var(--mono)}
    input.wallet{min-width:420px}
    @media (max-width: 520px){ input.wallet{min-width:0;width:100%} }
    button{cursor:pointer;font-weight:700}
    button:hover{border-color:#6ea8ff}
    button:active{transform:translateY(1px)}
    .small{color:var(--muted);font-size:12px;margin-top:10px}
    .err{
      margin-top:10px;
      border:1px solid rgba(255,92,122,.45);
      background:rgba(255,92,122,.08);
      padding:10px 12px;
      border-radius:12px;
      color:#ffd0d9;
      display:none;
      white-space:pre-wrap;
    }

    /* results */
    .results{
      margin-top:12px;
      border:1px solid var(--border);
      border-radius:var(--r);
      background:var(--panel);
      padding:14px;
    }
    .resultsHead{display:flex;justify-content:space-between;align-items:flex-end;gap:10px;flex-wrap:wrap}
    .resultsTitle{font-weight:800;letter-spacing:.2px}
    .count{color:var(--muted);font-size:12px;margin-top:4px}
    .last{color:var(--muted);font-size:12px}
    .list{display:flex;flex-direction:column;gap:10px;margin-top:10px}

    .deploy{
      border:1px solid var(--border);
      background:var(--panel2);
      border-radius:14px;
      padding:12px;
    }
    .deployHead{
      display:grid;
      grid-template-columns: 1.1fr .7fr .6fr 1.2fr 220px;
      gap:10px;
      align-items:start;
    }
    @media (max-width: 980px){
      .deployHead{grid-template-columns:1fr 1fr;}
      .deployHead .dr{grid-column:1 / -1; justify-self:stretch;}
    }
    .cell .k{color:var(--muted2);font-size:11.5px;margin-bottom:4px}
    .cell .v{font-size:13px}
    .mono{font-family:var(--mono)}
    .tx a{font-family:var(--mono)}
    .dr{justify-self:end}
    @media (max-width: 980px){ .dr{justify-self:stretch} }
    .dr input{width:100%}
    .drInfo{color:var(--muted);font-size:12px;margin-top:6px}
    .party{
      margin-top:10px;
      display:grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap:8px;
    }
    @media (max-width: 980px){ .party{grid-template-columns: repeat(2, minmax(0, 1fr));} }
    @media (max-width: 520px){ .party{grid-template-columns: 1fr;} }

    .unit{
      border:1px solid var(--border);
      border-radius:12px;
      padding:10px 10px;
      background:var(--panel);
      font-family:var(--mono);
      font-size:12px;
      line-height:1.3;
      cursor:pointer;
      user-select:text;
    }
    .unit:hover{border-color:var(--border2)}
    .unit.ok{border-color:rgba(46,229,157,.55); color:rgba(46,229,157,.95)}
    .unit.bad{border-color:rgba(255,92,122,.55); color:rgba(255,92,122,.95)}
    .unit.neutral{color:rgba(232,235,245,.92)}
    .unit .topline{display:flex;justify-content:space-between;gap:8px}
    .unit .tag{opacity:.9}
    .unit .roll{opacity:.95}
    .unit .name{margin-top:6px;color:var(--text)}
    .unit.ok .name{color:rgba(46,229,157,.95)}
    .unit.bad .name{color:rgba(255,92,122,.95)}

    /* toast */
    .toast{
      position:fixed;
      left:50%;
      bottom:18px;
      transform:translateX(-50%);
      padding:10px 12px;
      border-radius:12px;
      border:1px solid var(--border);
      background:rgba(17,20,28,.92);
      color:var(--text);
      font-size:12px;
      display:none;
      max-width:calc(100vw - 24px);
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="topbar">
      <div class="title">
        <div class="mark">HT</div>
        <div>
          <div class="h1">Huntertales — Active Deployment Predictor</div>
          <div class="sub">Scans your wallet for <b>active</b> deployments (no outcome tx yet). Enter <b>Custom DR</b> per deployment in <b>bps</b> (e.g. 3520 = 35.20%). Click a hunter card to copy its full seed.</div>
        </div>
      </div>
      <div class="rightMeta">
        <span class="pill"><span class="dot" id="dot"></span><span id="statusTxt">Idle</span></span>
        <span class="pill">Explorer: <a href="https://mega.etherscan.io" target="_blank" rel="noreferrer">mega.etherscan.io</a></span>
      </div>
    </div>

    <div class="controls">
      <div class="controlsRow">
        <div style="flex:1;min-width:260px">
          <label>Wallet address</label>
          <input id="wallet" class="wallet mono" placeholder="0x..." autocomplete="off" spellcheck="false" />
        </div>
        <div>
          <button id="runBtn">Scan</button>
        </div>
      </div>
      <div id="err" class="err"></div>
      <div class="small">RPC: <span class="mono" id="rpcLabel"></span></div>
    </div>

    <div class="results">
      <div class="resultsHead">
        <div>
          <div class="resultsTitle">Results</div>
          <div class="count" id="countTxt">No data yet.</div>
        </div>
        <div class="last" id="lastScanTxt"></div>
      </div>
      <div id="list" class="list">
        <div class="count">Click “Scan”.</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
/** === network === */
const RPC = "https://mainnet.megaeth.com/rpc";
document.getElementById("rpcLabel").textContent = RPC;

/** === contracts === */
const GAME  = "0x10005362672739146e5ced461ec3e9fd50ee55d1";     // game state
const PROXY = "0xd8c7079ac26d5e749bfe2c6c6f0e2617cc14dd7f";     // DungeonV1 proxy
const GAME_ID = 1;

/** logs */
const BATCH_SIG = "0xde46a24bd2bb7c32c4d7f4a89fae5b9dc30e0980d7a22a8c9600f6765a8d940b";

/** heuristics */
const STAKE_LOOKBACK_BLOCKS = 300000;   // recent stake logs should cover active deployments
const STAKE_CHUNK = 50000;

/** season = 1 */
const SEASON32 = (() => { const out = new Uint8Array(32); out[31]=1; return out; })();

/** hunter labels */
const HUNTER_NAME = new Map([
  [1,'Inori'],[2,'Akira'],[3,'Aiden'],[4,'Naia'],
  [5,'Ori'],[6,'Faye'],[7,'Robin'],[8,'Valkara'],
  [9,'Ren'],[10,'Garrick'],[11,'Jin'],[12,'Anastasia'],
  [13,'Soren'],[14,'Casca'],[15,'Elara'],[16,'Saber'],
  [17,'Yuki'],[18,'Cael'],[19,'Gojo'],[20,'Celeste'],
  [21,'Tomoe'],[22,'Seraph'],[23,'Elara'],[24,'Lucian'],
]);
function rarityTag(id){
  if(id>=1 && id<=4) return "C";
  if(id>=5 && id<=8) return "U";
  if(id>=9 && id<=12) return "R";
  if(id>=13 && id<=16) return "E";
  if(id>=17 && id<=20) return "L";
  if(id>=21 && id<=24) return "T";
  return "?";
}

/** UI */
const $ = (id)=>document.getElementById(id);
function setStatus(text, kind="warn"){
  $("statusTxt").textContent = text;
  const dot = $("dot");
  dot.classList.remove("ok","bad");
  dot.style.background = "";
  if(kind==="ok") dot.classList.add("ok");
  else if(kind==="bad") dot.classList.add("bad");
}
function showErr(msg){
  const el = $("err");
  el.style.display = msg ? "block" : "none";
  el.textContent = msg || "";
}
let toastTimer = null;
function toast(msg){
  const t = $("toast");
  t.textContent = msg;
  t.style.display = "block";
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=>{ t.style.display = "none"; }, 1400);
}

/** RPC */
let rpcId = 1;
async function rpc(method, params){
  const body = {jsonrpc:"2.0", id: rpcId++, method, params};
  const res = await fetch(RPC, {
    method:"POST",
    headers: {"content-type":"application/json"},
    body: JSON.stringify(body)
  });
  const j = await res.json();
  if(j.error) throw new Error(j.error.message || JSON.stringify(j.error));
  return j.result;
}
async function rpcBatch(reqs){
  const payload = reqs.map((r,i)=>({jsonrpc:"2.0", id:i, ...r}));
  const res = await fetch(RPC, {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify(payload)});
  const j = await res.json();
  if(!Array.isArray(j)) return [];
  const out = [];
  for(const it of j){
    if(it.error) out[it.id] = {error: it.error};
    else out[it.id] = {result: it.result};
  }
  return out;
}

/** helpers */
function pad32_from_u64(x){
  let v = BigInt(x);
  v = v & ((1n<<64n)-1n);
  const out = new Uint8Array(32);
  for(let i=31;i>=24;i--){
    out[i] = Number(v & 0xffn);
    v >>= 8n;
  }
  return out;
}
function shortHex(h){ return h ? `${h.slice(0,10)}…${h.slice(-6)}` : "—"; }
function addrTopic(a){ return "0x"+a.toLowerCase().replace(/^0x/,"").padStart(64,"0"); }

/** ABI-like decoding helpers */
const pu = (n)=>BigInt(n).toString(16).padStart(64,"0");                 // uint256 word
const pa = (a)=>a.toLowerCase().replace("0x","").padStart(64,"0");       // address word
const wb = (hexNo0x, byteOffset)=>{
  const s = hexNo0x.slice(byteOffset*2, byteOffset*2 + 64);
  return s.length === 64 ? BigInt("0x"+s) : 0n;
};
const wn = (hexNo0x, byteOffset)=> Number(wb(hexNo0x, byteOffset));

/** decode batch event data */
function hexToWords32(dataHex){
  const h = dataHex.startsWith("0x") ? dataHex.slice(2) : dataHex;
  const words = [];
  for(let i=0;i<h.length;i+=64){
    words.push(h.slice(i,i+64).padEnd(64,"0"));
  }
  return words;
}
function wordToBigInt(w){ return BigInt("0x"+w); }
function decodeBatchEvent(log){
  const words = hexToWords32(log.data);
  const sectorX = Number(wordToBigInt(words[0] || "0"));
  const sectorY = Number(wordToBigInt(words[1] || "0"));
  const numHunters = Number(wordToBigInt(words[6] || "0"));
  const traits = [];
  for(let i=0;i<numHunters && i<8;i++){
    const w = words[7+i];
    if(!w) break;
    traits.push(Number(wordToBigInt(w)));
  }
  return { sectorX, sectorY, numHunters, traits };
}

/** chunked logs (descending) */
async function getLogsChunked({address, topics, fromBlock, toBlock, chunkSize, onProgress}){
  const out = [];
  let curTo = toBlock;
  while(curTo >= fromBlock){
    const curFrom = Math.max(fromBlock, curTo - chunkSize + 1);
    const filter = {
      address,
      topics,
      fromBlock: "0x"+curFrom.toString(16),
      toBlock: "0x"+curTo.toString(16),
    };
    const logs = await rpc("eth_getLogs", [filter]) || [];
    out.push(...logs);
    if(onProgress) onProgress({curFrom, curTo, total: out.length});
    curTo = curFrom - 1;
  }
  return out;
}

/** Reads active deployments from GAME contract. */
async function fetchDeployments(wallet){
  // selector 0xa4b80a50
  const data = "0xa4b80a50" + pu(GAME_ID) + pa(wallet);
  const r = await rpc("eth_call", [{to: GAME, data}, "latest"]);
  const h = r.slice(2);

  const count = wn(h, 32);
  if(!count) return [];

  const BASE = 64;
  const out = [];
  for(let i=0;i<count;i++){
    const entryOffset = wn(h, BASE + i*32);
    const base = BASE + entryOffset;

    const ts   = wn(h, base);
    const a1o  = wn(h, base + 32);
    const a2o  = wn(h, base + 64);

    const x    = wn(h, base + 4*32);
    const y    = wn(h, base + 5*32);

    const blockNum = wn(h, base + 7*32); // fallback only
    const powerWei = wb(h, base + 8*32);

    const a1   = base + a1o;
    const hc   = wn(h, a1);
    const traits = [];
    for(let j=0;j<hc && j<8; j++){
      traits.push(wn(h, a1 + 32 + j*32));
    }

    const a2   = base + a2o;
    const sc   = wn(h, a2);
    const survived = [];
    for(let j=0;j<sc && j<8; j++){
      survived.push(wn(h, a2 + 32 + j*32) > 0);
    }

    out.push({ id:i, ts, x, y, blockNum, powerWei, traits, survived });
  }
  return out;
}

/** prediction (roll only) */
function computeRoll({player20, timestampSec, sectorX, sectorY, hunterId, hunterIndex, blockHash}){
  const payload = ethers.concat([
    player20,
    pad32_from_u64(timestampSec),
    SEASON32,
    pad32_from_u64(sectorX),
    pad32_from_u64(sectorY),
    pad32_from_u64(hunterId),
    pad32_from_u64(hunterIndex),
    ethers.getBytes(blockHash)
  ]);
  const seed = ethers.keccak256(payload);
  const roll = Number(BigInt(seed) % 10000n);
  return { seed, roll };
}

/** state */
let state = {
  customDR: new Map(),   // depKey -> number(bps)
  rows: []
};

function depKey(dep){ return `${dep.id}:${dep.x},${dep.y}:${(dep.traits||[]).join(",")}`; }
function stakeKey(x,y,traits){ return `${x},${y}|${(traits||[]).join(",")}`; }

function render(){
  const list = $("list");
  list.innerHTML = "";

  const rows = state.rows || [];
  $("countTxt").textContent = rows.length ? `Active deployments: ${rows.length}` : "No active deployments found.";
  if(!rows.length){
    list.innerHTML = `<div class="count">No active deployments found.</div>`;
    return;
  }

  for(const r of rows){
    const key = r.key;
    const custom = state.customDR.get(key);
    const effectiveDR = Number.isFinite(custom) ? custom : null;

    const drInfo = effectiveDR === null
      ? `Enter DR to evaluate`
      : `Effective: ${(effectiveDR/100).toFixed(2)}%`;

    const partyHtml = r.party.map(h => {
      const hasDR = Number.isFinite(effectiveDR);
      const survived = hasDR ? (h.roll >= effectiveDR) : null;
      const cls = !hasDR ? "neutral" : (survived ? "ok" : "bad");
      const tag = !hasDR ? "ROLL" : (survived ? "OK" : "DEAD");
      const roll = String(h.roll).padStart(4,"0");
      return `
        <div class="unit ${cls}" data-seed="${h.seed}">
          <div class="topline"><span class="tag">${tag}</span><span class="roll">${roll}</span></div>
          <div class="name">${h.name} (${h.rarity})</div>
        </div>
      `;
    }).join("");

    list.insertAdjacentHTML("beforeend", `
      <div class="deploy">
        <div class="deployHead">
          <div class="cell">
            <div class="k">Deployed</div>
            <div class="v">${r.deployedStr}</div>
          </div>
          <div class="cell">
            <div class="k">Sector</div>
            <div class="v mono">(${r.sectorX},${r.sectorY})</div>
          </div>
          <div class="cell">
            <div class="k">Block</div>
            <div class="v mono">#${r.blockNum}</div>
          </div>
          <div class="cell tx">
            <div class="k">Stake tx</div>
            <div class="v">${r.sourceHtml}</div>
          </div>
          <div class="cell dr">
            <div class="k">Custom DR (bps)</div>
            <input class="mono" inputmode="numeric" autocomplete="off" spellcheck="false"
              data-depkey="${key}"
              placeholder="e.g. 3520"
              value="${Number.isFinite(custom) ? String(custom) : ""}"
              title="Custom death rate in bps (0..10000). Example: 3520 = 35.20%." />
            <div class="drInfo">${drInfo}</div>
          </div>
        </div>
        <div class="party">${partyHtml}</div>
      </div>
    `);
  }
}

/** DR input: keep focus while re-rendering */
$("list").addEventListener("input", (ev) => {
  const t = ev.target;
  if(!(t instanceof HTMLInputElement)) return;
  const key = t.getAttribute("data-depkey");
  if(!key) return;

  const selStart = (typeof t.selectionStart === "number") ? t.selectionStart : null;
  const selEnd   = (typeof t.selectionEnd === "number") ? t.selectionEnd : null;

  const raw = String(t.value || "").trim();

  if(raw === ""){
    state.customDR.delete(key);
    render();
  } else {
    const v = Number(raw);
    if(!Number.isFinite(v) || v < 0 || v > 10000){
      // Avoid re-rendering on invalid input to prevent cursor jumps
      return;
    }
    state.customDR.set(key, Math.floor(v));
    render();
  }

  // restore focus & caret after render
  const again = [...document.querySelectorAll('input[data-depkey]')].find(el => el.dataset.depkey === key);
  if(again){
    again.focus({preventScroll:true});
    if(selStart !== null && selEnd !== null){
      try { again.setSelectionRange(selStart, selEnd); } catch(_) {}
    }
  }
});

/** click hunter card to copy seed */
$("list").addEventListener("click", async (ev) => {
  const el = ev.target.closest?.(".unit");
  if(!el) return;
  const seed = el.getAttribute("data-seed");
  if(!seed) return;
  try{
    await navigator.clipboard.writeText(seed);
    toast("Seed copied");
  }catch(_){
    toast("Copy failed (clipboard blocked)");
  }
});

/** main */
async function run(){
  showErr("");
  const w = $("wallet").value.trim();
  if(!w){ showErr("Paste a wallet address (0x...)."); return; }

  let wallet;
  try { wallet = ethers.getAddress(w); } catch(e){ showErr("Invalid address: " + e.message); return; }

  setStatus("Getting latest block…");
  const latestHex = await rpc("eth_blockNumber", []);
  const latest = Number(BigInt(latestHex));

  setStatus("Reading deployments…");
  const deps = await fetchDeployments(wallet);

  if(!deps.length){
    state.rows = [];
    render();
    setStatus("No deployments", "bad");
    return;
  }

  // Build lookup: stake batch logs for wallet (recent blocks), keyed by sector+traits.
  setStatus("Scanning stake logs…");
  const fromStake = Math.max(0, latest - STAKE_LOOKBACK_BLOCKS);
  const stakeLogs = await getLogsChunked({
    address: PROXY,
    topics: [BATCH_SIG, addrTopic(wallet)],
    fromBlock: fromStake,
    toBlock: latest,
    chunkSize: STAKE_CHUNK,
    onProgress: ({total}) => setStatus(`Scanning stake logs… ${total}`)
  });

  // newest-first; map latest occurrence per key
  stakeLogs.sort((a,b)=>{
    const ab = Number(BigInt(a.blockNumber));
    const bb = Number(BigInt(b.blockNumber));
    if(ab !== bb) return bb - ab;
    const ai = Number(BigInt(a.logIndex));
    const bi = Number(BigInt(b.logIndex));
    return bi - ai;
  });

  const stakeMap = new Map(); // key -> {blockNum, txHash, sectorX, sectorY, traits}
  for(const l of stakeLogs){
    const d = decodeBatchEvent(l);
    if(!d.traits?.length) continue;
    const k = stakeKey(d.sectorX, d.sectorY, d.traits);
    if(!stakeMap.has(k)){
      stakeMap.set(k, {
        blockNum: Number(BigInt(l.blockNumber)),
        txHash: l.transactionHash,
        sectorX: d.sectorX,
        sectorY: d.sectorY,
        traits: d.traits
      });
    }
  }

  // Decide block numbers to fetch: prefer stake block if match found, else fallback to dep.blockNum
  const chosenBlocks = [];
  const chosenInfo = []; // per dep: {matched, blockNum, txHash}
  for(const dep of deps){
    const k = stakeKey(dep.x, dep.y, dep.traits || []);
    const m = stakeMap.get(k);
    if(m){
      chosenInfo.push({ matched:true, blockNum:m.blockNum, txHash:m.txHash });
      chosenBlocks.push(m.blockNum);
    }else{
      chosenInfo.push({ matched:false, blockNum:dep.blockNum || 0, txHash:null });
      if(dep.blockNum) chosenBlocks.push(dep.blockNum);
    }
  }

  // fetch blocks (hash+timestamp) in batch
  setStatus("Fetching blocks…");
  const uniqBlocks = [...new Set(chosenBlocks.filter(Boolean))];
  const blockReqs = uniqBlocks.map(bn => ({method:"eth_getBlockByNumber", params:["0x"+bn.toString(16), false]}));
  const blockRes = await rpcBatch(blockReqs);
  const blockMap = new Map();
  for(let i=0;i<uniqBlocks.length;i++){
    const bn = uniqBlocks[i];
    const r = blockRes[i]?.result;
    if(r && r.hash && r.timestamp){
      blockMap.set(bn, {hash:r.hash, ts:Number(BigInt(r.timestamp))});
    }
  }

  setStatus("Computing rolls…");
  const player20 = ethers.getBytes(wallet);

  const rows = [];
  for(let i=0;i<deps.length;i++){
    const dep = deps[i];
    const info = chosenInfo[i];
    const bn = info.blockNum;
    const blk = blockMap.get(bn);
    const bh = blk?.hash;
    const ts = blk?.ts ?? dep.ts ?? 0;
    if(!bh || !ts || !dep.traits?.length) continue;

    const party = dep.traits.map((hunterId, idx) => {
      const pr = computeRoll({
        player20,
        timestampSec: ts,
        sectorX: dep.x,
        sectorY: dep.y,
        hunterId,
        hunterIndex: idx,
        blockHash: bh
      });
      const name = HUNTER_NAME.get(hunterId) || ("#"+hunterId);
      return { hunterId, idx, name, rarity: rarityTag(hunterId), roll: pr.roll, seed: pr.seed };
    });

    const deployedStr = new Date((dep.ts || ts)*1000).toLocaleString();
    const sourceHtml = info.matched
      ? `<a href="https://mega.etherscan.io/tx/${info.txHash}" target="_blank" rel="noreferrer">${shortHex(info.txHash)}</a>`
      : `<span class="mono">#${dep.id}</span> <span style="color:var(--muted);font-size:12px">(no stake match)</span>`;

    rows.push({
      key: depKey(dep),
      deployedStr,
      sectorX: dep.x,
      sectorY: dep.y,
      blockNum: bn,
      sourceHtml,
      party
    });
  }

  rows.sort((a,b)=> (b.blockNum||0) - (a.blockNum||0));
  state.rows = rows;

  $("lastScanTxt").textContent = `Last scan: ${new Date().toLocaleString()}`;
  render();
  setStatus(`Done — ${rows.length} active`, rows.length ? "ok" : "bad");
}

$("runBtn").addEventListener("click", () => {
  setStatus("Working…");
  run().catch(e => {
    console.error(e);
    setStatus("Error", "bad");
    showErr(String(e?.message || e));
  });
});
</script>
</body>
</html>
